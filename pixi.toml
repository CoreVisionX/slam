[workspace]
authors = ["Jacob Van Meter <jacobvm04@gmail.com>"]
channels = ["conda-forge"]
name = "slam"
platforms = ["linux-aarch64", "osx-arm64"]
version = "0.1.0"
preview = ["pixi-build"]

[tasks]

[dependencies]
python = ">=3.10,<3.11"
pip = ">=25.2,<26"
hydra-core = ">=1.3.2,<2"

[pypi-dependencies]
gtsam-develop = ">=4.3a0.dev202510200041, <5"
opencv-python-headless = ">=4.12.0.88, <5"
rerun-sdk = ">=0.27.2, <0.28"
tqdm = ">=4.66.0, <5"
slam = { path = "." }

[feature.dev.pypi-dependencies]
ipykernel = ">=7.1.0, <8"
matplotlib = ">=3.10.7, <4"

[environments.dev]
features = ["dev"]

[package]
name = "slam"
version = "0.1.0"

[package.build]
backend = { name = "pixi-build-python", version = "==0.4.0" }

[package.host-dependencies]
hatchling = "==1.26.3"

[package.run-dependencies]
python = ">=3.10,<3.11"
hydra-core = ">=1.3.2,<2"
gtsam-develop = ">=4.3a0.dev202510200041, <5"
opencv-python-headless = ">=4.12.0.88, <5"
rerun-sdk = ">=0.27.2, <0.28"
tqdm = ">=4.66.0, <5"
