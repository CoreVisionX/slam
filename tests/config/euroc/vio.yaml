# @package _global_

_target_: slam.vio.core.VIO

config:
  _target_: slam.vio.config.VIOConfig
  imu_from_left:
    - [0.0148655429818, -0.999880929698, 0.00414029679422, -0.0216401454975]
    - [0.999557249008, 0.0149672133247, 0.025715529948, -0.064676986768]
    - [-0.0257744366974, 0.00375618835797, 0.999660727178, 0.00981073058949]
    - [0.0, 0.0, 0.0, 1.0]
  imu_from_right:
    - [0.0125552670891, -0.999755099723, 0.0182237714554, -0.0198435579556]
    - [0.999598781151, 0.0130119051815, 0.0251588363115, 0.0453689425024]
    - [-0.0253898008918, 0.0179005838253, 0.999517347078, 0.00786212447038]
    - [0.0, 0.0, 0.0, 1.0]
  baseline: 0.11
  K_left_rect:
    - [436.24429565, 0.0, 364.44123459]
    - [0.0, 436.24429565, 256.95167542]
    - [0.0, 0.0, 1.0]
  K_right_rect:
    - [436.24429565, 0.0, 364.44123459]
    - [0.0, 436.24429565, 256.95167542]
    - [0.0, 0.0, 1.0]
  width: 752
  height: 480
  optimize_every: 1
  log_every: 8
  log_landmarks_every: 16
  keyframe_interval: 4
  ransac_inliers_only: true

feature_tracker:
  _target_: slam.vio.klt_tracker.KLTFeatureTrackerCpp
  max_feature_count: 200
  refill_feature_ratio: 0.8
  feature_suppression_radius: 10.0
  lk_win_size: [24, 24]
  lk_max_level: 5
  lk_max_iterations: 30
  lk_epsilon: 0.01
  lk_min_eig_threshold: 0.001
  max_depth: 40.0
  gftt_quality_level: 0.01
  gftt_min_distance: 1.0
  gftt_block_size: 3
  gftt_use_harris_detector: false
  gftt_k: 0.04
  stereo_ransac_threshold: 1.0
  stereo_max_y_diff: 1.0
  min_disparity: 0.1
  templ_rows: 6
  templ_cols: 31
  stripe_extra_rows: 0
  template_matching_tolerance: 0.15
  subpixel_refinement: false
  stereo_min_depth: 0.15
  profile_timing: false

relative_pose_initializer:
  _target_: slam.vio.relative_pose.RelativePnPInitializer
  min_matches_for_pnp: 6
  max_depth: 40.0

# TODO: remove unused params
# TODO: add params for configuring the LM/iSAM2 optimizer (and choosing between them!) and see if tweaking them can yield any performance improvements
# TODO: huber/cauchy k parameters (good candidates for leveraging _target_ to directly instansiate the gtsam nosie models)
ba:
  _target_: slam.vio.bundle_adjustment.FixedLagBundleAdjuster
  config:
    _target_: slam.vio.bundle_adjustment.BundleAdjustmentConfig
    optimizer: incremental
    min_observations_per_landmark: 1
    min_observations_per_frame: 5
    projection_noise_px: 0.5
    disparity_noise_px: 0.5
    use_huber_loss: true
    reprojection_gating: false
    reprojection_gating_threshold_px: 8.0
    reprojection_gating_min_obs: 12
    use_inlier_observations_only: false
    pose_prior_sigmas:
      [
        1.7453292519943296e-05,
        # 0.2,
        # 1.7453292519943296e-05,
        0.2,
        # 1.7453292519943296e-05,
        0.2,
        0.0001,
        0.0001,
        0.0001,
      ]
    max_landmarks: 10000000000
    max_observations_per_landmark: 100000000
    use_motion_only_smart_factors: false
    use_light_relative_pose_factor: false
    light_relative_pose_sigmas: [0.2, 0.2, 0.2, 0.25, 0.25, 0.25]
    min_depth: 0.0
    lag: 8.0
    imu_bias_prior_for_factors: [0.1, 0.1, 0.1, 0.001, 0.001, 0.001] # TODO: increase gyro thresh

imu_preintegrator:
  _target_: slam.vio.imu_preintegration.ImuPreintegrator
  config:
    _target_: slam.vio.imu_preintegration.ImuPreintegrationConfig
    gravity: [0.0, 0.0, -9.80665]
    accel_noise: 0.002
    gyro_noise: 0.00017
    accel_random_walk: 3.0000e-3
    gyro_random_walk: 1.9393e-05
    integration_noise: 0.0005


relocalization:
  _target_: slam.vio.relocalization.OrbRelocalization
  config:
    _target_: slam.vio.relocalization.OrbRelocalizationConfig
    enabled: true
    run_every_frames: 10
    min_inliers: 100
    match_ratio_thresh: 0.75
    pnp_reprojection_error: 2.0


logger:
  _target_: slam.vio.io.VIORerunLogger
  spawn: true
  feature_radii: 4.0
  image_plane_dist: 0.6
  cam_view_coordinates: RDF
  world_view_coordinates: RIGHT_HAND_Z_UP
