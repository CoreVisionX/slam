vio:
  _target_: slam.vio.core.VIO

  config:
    _target_: slam.vio.config.VIOConfig
    gravity: [0.0, 0.0, -9.80665]
    imu_from_left:
      - [0.0148655429818, -0.999880929698, 0.00414029679422, -0.0216401454975]
      - [0.999557249008, 0.0149672133247, 0.025715529948, -0.064676986768]
      - [-0.0257744366974, 0.00375618835797, 0.999660727178, 0.00981073058949]
      - [0.0, 0.0, 0.0, 1.0]
    imu_from_right:
      - [0.0125552670891, -0.999755099723, 0.0182237714554, -0.0198435579556]
      - [0.999598781151, 0.0130119051815, 0.0251588363115, 0.0453689425024]
      - [-0.0253898008918, 0.0179005838253, 0.999517347078, 0.00786212447038]
      - [0.0, 0.0, 0.0, 1.0]
    baseline: 0.11007784219171353
    K_left_rect:
      - [436.24429565, 0.0, 364.44123459]
      - [0.0, 436.24429565, 256.95167542]
      - [0.0, 0.0, 1.0]
    K_right_rect:
      - [436.24429565, 0.0, 364.44123459]
      - [0.0, 436.24429565, 256.95167542]
      - [0.0, 0.0, 1.0]
    width: 752
    height: 480
    optimize_every: 4
    log_every: 1

  feature_tracker:
    _target_: slam.local_vo.klt_tracker.KLTFeatureTracker
    max_feature_count: 256
    refill_feature_ratio: 0.8
    feature_suppression_radius: 8.0
    fast_threshold: 25
    fast_nonmax: true
    fast_border: 12
    lk_win_size: [15, 15]
    lk_max_level: 5
    lk_max_iterations: 40
    lk_epsilon: 0.01
    lk_min_eig_threshold: 0.001
    max_depth: 40.0

  relative_pose_initializer:
    _target_: slam.local_vo.relative_pose.RelativePnPInitializer
    min_matches_for_pnp: 6
    max_depth: 40.0

  # TODO: remove unused params
  # TODO: add params for configuring the LM/iSAM2 optimizer (and choosing between them!) and see if tweaking them can yield any performance improvements
  # TODO: huber/cauchy k parameters (good candidates for leveraging _target_ to directly instansiate the gtsam nosie models)
  ba:
    _target_: slam.local_vo.bundle_adjustment.FixedLagBundleAdjuster
    config:
      _target_: slam.local_vo.bundle_adjustment.BundleAdjustmentConfig
      min_observations_per_landmark: 1
      min_observations_per_frame: 5
      projection_noise_px: 1.0
      disparity_noise_px: 1.0
      use_huber_loss: true
      reprojection_gating_threshold_px: 8.0
      use_inlier_observations_only: false
      pose_prior_sigmas:
        [
          1.7453292519943296e-05,
          1.7453292519943296e-05,
          1.7453292519943296e-05,
          0.0001,
          0.0001,
          0.0001,
        ]
      imu_gravity_magnitude: 9.80665
      imu_accel_noise: 0.002
      imu_gyro_noise: 0.00017
      imu_integration_noise: 0.0005
      imu_velocity_prior_sigma: 10.0
      imu_bias_prior_sigmas:
        [0.003, 0.003, 0.003, 1.9393e-05, 1.9393e-05, 1.9393e-05]
      imu_bias_prior_for_factors: [0.01, 0.01, 0.01, 0.001, 0.001, 0.001]
      max_landmarks: 10000000000
      max_observations_per_landmark: 100000000
      use_motion_only_smart_factors: false
      light_relative_pose_sigmas: [3.0, 3.0, 3.0, 3.0, 3.0, 3.0]
      min_depth: 0.0
      lag: 8.0

  logger:
    _target_: slam.vio.io.VIORerunLogger

    spawn: true
    feature_radii: 4.0
    image_plane_dist: 0.6
  

data_pipeline:
  _target_: tests.datasets.pipeline.SequencePreprocessor
  stages:
    - _target_: tests.datasets.pipeline.LoadSequenceStage
      loader:
        _target_: tests.datasets.loaders.EurocSequenceLoader
        seq_name: VI_02_medium
        sequence_length: 200
        base_seed: 15
        sampling_mode: contiguous
        min_stride: 1
        max_stride: 1
        add_imu_noise: false
    - _target_: tests.datasets.pipeline.RectifyFramesStage
      rectifier:
        _target_: tests.datasets.rectifiers.StereoSequenceRectifier
        force_rectification: false
