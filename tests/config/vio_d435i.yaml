_target_: slam.vio.core.VIO

config:
  _target_: slam.vio.config.VIOConfig
  gravity: [0, 9.80655, 0]

  # T_ic (cam -> imu) from Kalibr
  imu_from_left:
    - [0.99995845,  0.00382811, -0.00827314, -0.0055536]
    - [-0.00380265,  0.99998799, 0.00309183,  0.00516152]
    - [0.00828487,  -0.00306025,  0.999961,  0.01517235]
    - [0.0,         0.0,         0.0,         1.0]
  imu_from_right:
    - [0.99995845,  0.00382811, -0.00827314,  0.04397001]
    - [-0.00380265,  0.99998799, 0.00309183,  0.00497319]
    - [0.00828487,  -0.00306025,  0.999961,  0.01558266]
    - [0.0,         0.0,         0.0,         1.0]

  # Baseline norm from Kalibr (cam0 -> cam1)
  baseline: 0.04984387382864952

  # Intrinsics from Kalibr (these are for the distorted images;
  # you can override with rectified K at runtime as we discussed).
  # TODO: make sure they get overriden

  # Camera model: pinhole
  # Focal length: [427.6597900390625, 427.6597900390625]
  # Principal point: [426.3415222167969, 236.13694763183594]
  # Distortion model: radtan
  # Distortion coefficients: [0.0, 0.0, 0.0, 0.0]
  K_left_rect:
    - [427.6597900390625, 0.0,                  426.3415222167969]
    - [0.0,                427.6597900390625,   236.13694763183594]
    - [0.0,                0.0,                  1.0]

  # Camera model: pinhole
  # Focal length: [427.6597900390625, 427.6597900390625]
  # Principal point: [426.3415222167969, 236.13694763183594]
  # Distortion model: radtan
  # Distortion coefficients: [0.0, 0.0, 0.0, 0.0]
  K_right_rect:
    - [427.6597900390625, 0.0,                  426.3415222167969]
    - [0.0,                427.6597900390625,   236.13694763183594]
    - [0.0,                0.0,                  1.0]

  # Resolution used in Kalibr
  width: 848
  height: 480

  optimize_every: 1
  keyframe_interval: 8
  log_every: 4
  log_landmarks_every: 16

  ransac_inliers_only: true

feature_tracker:
  _target_: slam.vio.klt_tracker.KLTFeatureTrackerCpp
  max_feature_count: 128
  refill_feature_ratio: 0.8
  feature_suppression_radius: 20.0
  lk_win_size: [24, 24]
  lk_max_level: 4
  lk_max_iterations: 30
  lk_epsilon: 0.1
  lk_min_eig_threshold: 0.001
  max_depth: 40.0
  gftt_quality_level: 0.001
  gftt_min_distance: 20.0
  gftt_block_size: 3
  gftt_use_harris_detector: false
  gftt_k: 0.04
  stereo_ransac_threshold: 2.0
  stereo_max_y_diff: 2.0
  min_disparity: 0.1
  templ_rows: 6
  templ_cols: 31
  stripe_extra_rows: 0
  template_matching_tolerance: 0.15
  subpixel_refinement: false
  stereo_min_depth: 0.15
  profile_timing: false

relative_pose_initializer:
  _target_: slam.vio.relative_pose.RelativePnPInitializer
  min_matches_for_pnp: 6
  max_depth: 40.0

# TODO: remove unused params
# TODO: add params for configuring the LM/iSAM2 optimizer (and choosing between them!) and see if tweaking them can yield any performance improvements
# TODO: huber/cauchy k parameters (good candidates for leveraging _target_ to directly instansiate the gtsam nosie models)
ba:
  _target_: slam.vio.bundle_adjustment.FixedLagBundleAdjuster
  config:
    _target_: slam.vio.bundle_adjustment.BundleAdjustmentConfig
    min_observations_per_landmark: 1
    min_observations_per_frame: 5
    projection_noise_px: 0.5
    disparity_noise_px: 0.5
    use_huber_loss: true
    reprojection_gating_threshold_px: 8.0
    use_inlier_observations_only: false
    pose_prior_sigmas:
      [
        # 1.7453292519943296e-05,
        # 1.7453292519943296e-05,
        # 1.7453292519943296e-05,
        
        0.1,
        0.00001,
        0.1,

        # 0.001,
        # 0.001,
        # 0.001,

        0.0001,
        0.0001,
        0.0001,
      ]
    max_landmarks: 10000000000
    max_observations_per_landmark: 100000000
    use_motion_only_smart_factors: false
    light_relative_pose_sigmas: [0.2, 0.2, 0.2, 0.1, 0.1, 0.1]
    min_depth: 0.0
    lag: 3.0
    imu_bias_prior_for_factors: [0.5, 0.5, 0.5, 0.01, 0.01, 0.01]

imu_preintegrator:
  _target_: slam.vio.imu_preintegration.ImuPreintegrator
  config:
    _target_: slam.vio.imu_preintegration.ImuPreintegrationConfig
    gravity: [0, 9.80655, 0]
    gravity_magnitude: 9.80655

    # From Kalibr IMU configuration (continuous noise densities)
    accel_noise: 0.008183027       # m/s^2 / sqrt(Hz)
    gyro_noise: 0.00109979       # rad/s  / sqrt(Hz)

    accel_random_walk: 7.976531501174554e-04
    gyro_random_walk: 2.882662305656072e-05

    integration_noise: 0.0005

logger:
  _target_: slam.vio.io.VIORerunLogger
  spawn: false
  url: ${oc.env:RERUN_URL}
  feature_radii: 4.0
  image_plane_dist: 0.2
  cam_view_coordinates: RDF
  world_view_coordinates: RDF
